# coturn config for ha-videocall (secrets/IPs come via compose args — .env).
listening-port=3478

# long-term credentials (single static user for the household — set in .env)
lt-cred-mech
realm=example.com

# relay allocation range — MUST match the router UDP port-forward
min-port=49160
max-port=49200

fingerprint
stale-nonce=600

# plain TURN (no cert management); add TLS later if a network blocks 3478
no-tls
no-dtls

# hygiene
no-multicast-peers
user-quota=12
total-quota=48

# uncomment to log every allocation (useful when verifying port-forwards)
#verbose
